{% extends "base.html" %}

{% block title %}Mon profil{% endblock %}

{% block content %}
<div class="page-header">
    <h1>👤 Mon profil</h1>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="grid grid-2">
                <div class="form-group">
                    <label>Prénom</label>
                    {{ form.first_name }}
                </div>
                <div class="form-group">
                    <label>Nom</label>
                    {{ form.last_name }}
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                {{ form.email }}
            </div>
            <div class="grid grid-2">
                <div class="form-group">
                    <label>Téléphone</label>
                    {{ form.telephone }}
                </div>
                <div class="form-group">
                    <label>Formation</label>
                    {{ form.formation }}
                </div>
            </div>
            <div class="form-group">
                <label>N° étudiant</label>
                {{ form.numero_etudiant }}
            </div>
            <button type="submit" class="btn btn-primary">Enregistrer</button>
        </form>
    </div>
</div>
{% endblock %}
