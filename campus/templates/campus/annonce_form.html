{% extends "base.html" %}

{% block title %}{{ titre }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ titre }}</h1>
</div>

<div class="card" style="max-width: 700px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="form-errors">{{ field.errors.0 }}</div>{% endif %}
            </div>
            {% endfor %}
            <div style="display: flex; gap: 0.75rem;">
                <button type="submit" class="btn btn-primary">Publier</button>
                <a href="{% url 'campus:annonces' %}" class="btn btn-outline">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
